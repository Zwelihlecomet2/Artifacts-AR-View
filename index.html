<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuttingEdge</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="https://kit.fontawesome.com/f9b4791500.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

    <video autoplay 
          playsinline 
          id="camera">
    </video>
    <!-- Entire Model Box -->
    <div class="model-box">
      <model-viewer id="modelViewer" 
                    src="purple_carnotaurus.glb"
                    alt="purple_carnotaurus"
                    ar
                    ar-placement="floor"
                    ar-modes="webxr scene-viewer quick-look"
                    camera-controls
                    interaction-prompt="none"
                    auto-rotate>
      </model-viewer>
    </div>

     <footer class="cover">
      <button slot="ar-button" class="btn" style="visibility: hidden;">AR</button>
     </footer>
    
    <script src="app.js"></script>
    <script>
      a = document.getElementById("below");
      b = document.querySelector(".cover");

      a.addEventListener("click", function() {
        b.classList.toggle("uncover");
      });

      // Info Icon Alert
      const infoBox = document.getElementById('info');
      const infoModal = document.getElementById('info-modal');
      const closeBtn = document.getElementById('close-btn');

      infoBox.addEventListener('click', () => { 
        infoModal.style.display = 'flex';
        console.log("Info modal opened");
      });
      closeBtn.addEventListener('click', () => { infoModal.style.display = 'none'; });

      //     size
      const modelViewer = document.getElementById('modelViewer');
        const scaleSlider = document.getElementById('model-scale');
        scaleSlider.addEventListener('input', () => {
          const scale = scaleSlider.value;
          modelViewer.scale = `${scale} ${scale} ${scale}`;
        });
    </script>
</body>
</html>
